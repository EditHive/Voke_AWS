version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "VITE_GROQ_API_KEY=$GROQ_API_KEY" >> .env
        - echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
